# xtquant-proxy configuration
# Switch runtime mode with APP_MODE=mock|dev|prod

app:
  name: "xtquant-proxy"
  version: "1.0.0"

logging:
  file: "logs/app.log"
  error_file: "logs/error.log"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} - {message}"
  rotation: "10 MB"
  retention: "30 days"
  compression: "zip"
  console_output: true
  backtrace: true
  diagnose: false

grpc:
  enabled: true
  host: "0.0.0.0"
  port: 50051
  max_workers: 10
  max_message_length: 52428800

xtquant:
  # 在 config.local.yml / config.test.local.yml 中填写本机路径
  # MiniQMT 通常使用 userdata_mini；券商 QMT / 投研端通常使用 userdata
  qmt_userdata_path:
  data:
    path: "./data"
    config_path: "./xtquant/config"
    max_queue_size: 1000
    max_subscriptions: 100
    heartbeat_interval: 60
    whole_quote_enabled: false
  trading:
    mock_account_id: "mock_account_001"
    mock_password: "mock_password"
    enable_prod_orders: false
    accounts: []

testing:
  default_account_profile:
  enable_prod_readonly_tests: false
  qmt_userdata_path:
  prod_unlock_token:

modes:
  mock:
    debug: true
    host: "0.0.0.0"
    port: 8000
    log_level: "DEBUG"
    xtquant_mode: "mock"
    api_keys:
      - "mock-api-key-001"
      - "mock-api-key-002"
    database:
      url: "sqlite:///./app_mock.db"
    redis:
      url: "redis://localhost:6379/0"
    cors:
      allow_origins: ["*"]

  dev:
    debug: true
    host: "0.0.0.0"
    port: 8000
    log_level: "DEBUG"
    xtquant_mode: "dev"
    api_keys:
      - "dev-api-key-001"
      - "dev-api-key-002"
    database:
      url: "sqlite:///./app_dev.db"
    redis:
      url: "redis://localhost:6379/1"
    cors:
      allow_origins: ["*"]

  prod:
    debug: false
    host: "0.0.0.0"
    port: 8000
    log_level: "INFO"
    xtquant_mode: "prod"
    api_keys:
      - "prod-api-key-001"
      - "prod-api-key-002"
    database:
      url: "postgresql://user:password@localhost:5432/xtquant_proxy"
    redis:
      url: "redis://localhost:6379/0"
    cors:
      allow_origins: ["https://yourdomain.com"]
    logging:
      console_output: false
      diagnose: false

security:
  secret_key: "change-this-to-secure-key-in-production"
