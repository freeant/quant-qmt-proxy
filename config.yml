# xtquant-proxy configuration
# Switch runtime mode with APP_MODE=mock|dev|prod

app:
  name: "xtquant-proxy"
  version: "1.0.0"

logging:
  file: "logs/app.log"
  error_file: "logs/error.log"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} - {message}"
  rotation: "10 MB"
  retention: "30 days"
  compression: "zip"
  console_output: true
  backtrace: true
  diagnose: false

grpc:
  enabled: true
  host: "0.0.0.0"
  port: 50051
  # 每个 gRPC 流式 RPC 会占用一个 worker 直到连接结束；并发流较多时可适当调大
  max_workers: 20
  max_message_length: 52428800

xtquant:
  # 在 config.local.yml / config.test.local.yml 中填写本机路径
  # MiniQMT 通常使用 userdata_mini；券商 QMT / 投研端通常使用 userdata
  qmt_userdata_path:
  data:
    path: "./data"
    config_path: "./xtquant/config"
    max_queue_size: 1000
    max_subscriptions: 100
    heartbeat_interval: 60
    whole_quote_enabled: false
  trading:
    mock_account_id: "mock_account_001"
    mock_password: "mock_password"
    enable_prod_orders: false
    accounts: []

testing:
  default_account_profile:
  enable_prod_readonly_tests: false
  qmt_userdata_path:
  prod_unlock_token:

modes:
  mock:
    debug: true
    host: "0.0.0.0"
    port: 8000
    log_level: "DEBUG"
    xtquant_mode: "mock"
    api_keys:
      - "mock-api-key-001"
      - "mock-api-key-002"
    cors:
      allow_origins: ["*"]
      allow_credentials: false

  dev:
    debug: true
    host: "0.0.0.0"
    port: 8000
    log_level: "DEBUG"
    xtquant_mode: "dev"
    api_keys:
      - "dev-api-key-001"
      - "dev-api-key-002"
    cors:
      allow_origins: ["*"]
      allow_credentials: false

  prod:
    debug: false
    host: "0.0.0.0"
    port: 8000
    log_level: "INFO"
    xtquant_mode: "prod"
    api_keys:
      - "prod-api-key-001"
      - "prod-api-key-002"
    cors:
      allow_origins: ["https://yourdomain.com"]
      allow_credentials: true
    logging:
      console_output: false
      diagnose: false

security: {}

redis:
  enabled: false
  url: "redis://127.0.0.1:6379/0"
  stream_prefix: "qmt"
  maxlen: 2000
  connect_timeout_seconds: 2
  write_timeout_ms: 50
  fail_open: true
  delete_stream_on_unsubscribe: false
  grace_ttl_seconds: 60
  mirror_mock: true
  mirror_ephemeral: false
  mirror_whole_quote: false
  whole_quote_maxlen: 5000
  publish_subscription_ready: true
  circuit_breaker_enabled: true
  circuit_breaker_failure_threshold: 10
  circuit_breaker_cooldown_seconds: 30
  mirror_symbol_streams: false
  symbol_stream_maxlen: 5000
  mirror_trading_events: false
  trading_stream_maxlen: 2000
  trading_stream_grace_ttl_seconds: 60
  ssl_enabled: false
  ssl_cert_reqs: "required"
  ssl_ca_certs:
  sentinel_enabled: false
  sentinel_hosts: []
  sentinel_service_name: "mymaster"
  sentinel_password:
  sentinel_db: 0
